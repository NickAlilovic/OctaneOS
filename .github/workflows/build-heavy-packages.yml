name: Build heavy packages (same-cdi, ecwolf)

# Builds packages that are too memory-intensive for WSL2.
# Outputs are uploaded as artifacts and can be injected into
# the local build via local.mk pre-built overrides.

on:
  workflow_dispatch:   # manual trigger only — building locally on Steam Deck

env:
  # OUTPUT_DIR is the env var batocera's Makefile uses for O (passed to
  # buildroot as a relative path). Buildroot runs from batocera/buildroot/,
  # so the actual on-disk output is buildroot/ + OUTPUT_DIR + /<board>.
  # local.mk must live at that resolved path for buildroot to read it.
  OUTPUT_DIR: batocera/output/a733-cubie-a7s
  BR_OUTPUT_DIR: batocera/buildroot/batocera/output/a733-cubie-a7s/a733-cubie-a7s

jobs:
  build-ecwolf:
    name: Build ecwolf (aarch64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout OctaneOS
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install host build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc g++ make cmake ninja-build \
            git curl wget rsync cpio bc \
            libncurses-dev libssl-dev \
            python3 python3-dev \
            unzip file bison flex gawk whiptail \
            dosfstools mtools

      - name: Set up symlinks (non-interactive)
        run: |
          REPO_ROOT="$(pwd)"
          BATOCERA_DIR="${REPO_ROOT}/batocera"
          ln -sf "${REPO_ROOT}/board/batocera/allwinner/a733" \
                 "${BATOCERA_DIR}/board/batocera/allwinner/a733"
          ln -sf "${REPO_ROOT}/configs/batocera-a733-cubie-a7s.board" \
                 "${BATOCERA_DIR}/configs/batocera-a733-cubie-a7s.board"

      - name: Sync local.mk into output dir
        run: |
          # Write local.mk to both the legacy path and the actual buildroot
          # output path where $(O)/local.mk resolves (buildroot runs from
          # batocera/buildroot/, so O=batocera/output/.../a733 is relative
          # to that dir, landing at BR_OUTPUT_DIR on disk).
          mkdir -p "${{ env.OUTPUT_DIR }}"
          cp board/batocera/allwinner/a733/local.mk "${{ env.OUTPUT_DIR }}/local.mk"
          mkdir -p "${{ env.BR_OUTPUT_DIR }}"
          cp board/batocera/allwinner/a733/local.mk "${{ env.BR_OUTPUT_DIR }}/local.mk"

      - name: Install make shim (fixes --no-builtin-rules propagation)
        run: |
          REAL_MAKE="$(command -v make)"
          SHIM_DIR="$(mktemp -d)"
          cat > "${SHIM_DIR}/make" << SHIM_EOF
          #!/bin/bash
          _mf="\${MAKEFLAGS}"
          _mf="\$(echo "\$_mf" | sed 's/^\(-*\)\([A-QS-Za-qs-z]*\)r\([A-Za-z]*\)/\1\2\3/')"
          export MAKEFLAGS="\$_mf"
          exec ${REAL_MAKE} "\$@"
          SHIM_EOF
          chmod +x "${SHIM_DIR}/make"
          echo "${SHIM_DIR}" >> "$GITHUB_PATH"

      - name: Cache Buildroot toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.BR_OUTPUT_DIR }}/host
          key: buildroot-host-${{ hashFiles('configs/batocera-a733-cubie-a7s.board') }}-${{ hashFiles('batocera/buildroot/toolchain/**/*.mk') }}
          restore-keys: buildroot-host-

      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        with:
          path: batocera/dl
          key: buildroot-dl-${{ github.run_id }}
          restore-keys: buildroot-dl-

      - name: Pre-fetch tarballs that have flaky mirrors
        run: |
          mkdir -p batocera/dl
          # libtool - ftpmirror.gnu.org is unreliable; fetch directly from ftp.gnu.org
          wget -q -O batocera/dl/libtool-2.4.7.tar.xz \
            https://ftp.gnu.org/pub/gnu/libtool/libtool-2.4.7.tar.xz

      - name: Pre-seed dl/ecwolf/ cache (courtesy suckbluefrog/Batocera-Multilib)
        run: |
          # The tarball is a snapshot of a buildroot dl/ecwolf/ cache dir.
          # It contains ecwolf-<hash>-git4.tar.gz (pre-cloned with submodules)
          # so buildroot never needs to reach the private Bitbucket repos.
          mkdir -p batocera/dl
          wget -q -O /tmp/ecwolf-source.tar.gz \
            https://github.com/suckbluefrog/Batocera-Multilib/releases/download/7-4-2026/ecwolf-source.tar.gz
          tar xzf /tmp/ecwolf-source.tar.gz -C batocera/dl/
          echo "=== dl/ecwolf/ contents ==="
          ls -la batocera/dl/ecwolf/

      - name: Verify local.mk placement and content
        run: |
          echo "=== BR_OUTPUT_DIR ==="
          ls -la "${{ env.BR_OUTPUT_DIR }}/" 2>/dev/null || echo "DIRECTORY NOT FOUND: ${{ env.BR_OUTPUT_DIR }}"
          echo "=== local.mk ==="
          cat "${{ env.BR_OUTPUT_DIR }}/local.mk" 2>/dev/null || echo "FILE NOT FOUND"

      - name: Build ecwolf
        run: |
          cd batocera
          make a733-cubie-a7s-build CMD=ecwolf DIRECT_BUILD=1
        timeout-minutes: 120

      - name: Collect artifacts
        run: |
          mkdir -p ci-artifacts/ecwolf
          find "${{ env.BR_OUTPUT_DIR }}/build" -name "ecwolf" -path "*/buildroot-build/*" \
            -exec cp {} ci-artifacts/ecwolf/ \;
          find "${{ env.BR_OUTPUT_DIR }}/build" -name "ecwolf.pk3" \
            -exec cp {} ci-artifacts/ecwolf/ \;

      - name: Upload ecwolf artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ecwolf-aarch64
          path: ci-artifacts/ecwolf/
          retention-days: 90

  build-same-cdi:
    name: Build same-cdi / MAME (aarch64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout OctaneOS
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install host build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc g++ make \
            git curl wget rsync cpio bc \
            libncurses-dev libssl-dev \
            python3 python3-dev \
            unzip file bison flex gawk whiptail \
            dosfstools mtools

      - name: Set up symlinks (non-interactive)
        run: |
          REPO_ROOT="$(pwd)"
          BATOCERA_DIR="${REPO_ROOT}/batocera"
          ln -sf "${REPO_ROOT}/board/batocera/allwinner/a733" \
                 "${BATOCERA_DIR}/board/batocera/allwinner/a733"
          ln -sf "${REPO_ROOT}/configs/batocera-a733-cubie-a7s.board" \
                 "${BATOCERA_DIR}/configs/batocera-a733-cubie-a7s.board"

      - name: Sync local.mk into output dir
        run: |
          mkdir -p "${{ env.OUTPUT_DIR }}"
          cp board/batocera/allwinner/a733/local.mk "${{ env.OUTPUT_DIR }}/local.mk"
          mkdir -p "${{ env.BR_OUTPUT_DIR }}"
          cp board/batocera/allwinner/a733/local.mk "${{ env.BR_OUTPUT_DIR }}/local.mk"

      - name: Install make shim (fixes --no-builtin-rules propagation)
        run: |
          REAL_MAKE="$(command -v make)"
          SHIM_DIR="$(mktemp -d)"
          cat > "${SHIM_DIR}/make" << SHIM_EOF
          #!/bin/bash
          _mf="\${MAKEFLAGS}"
          _mf="\$(echo "\$_mf" | sed 's/^\(-*\)\([A-QS-Za-qs-z]*\)r\([A-Za-z]*\)/\1\2\3/')"
          export MAKEFLAGS="\$_mf"
          exec ${REAL_MAKE} "\$@"
          SHIM_EOF
          chmod +x "${SHIM_DIR}/make"
          echo "${SHIM_DIR}" >> "$GITHUB_PATH"

      - name: Cache Buildroot toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.BR_OUTPUT_DIR }}/host
          key: buildroot-host-${{ hashFiles('configs/batocera-a733-cubie-a7s.board') }}-${{ hashFiles('batocera/buildroot/toolchain/**/*.mk') }}
          restore-keys: buildroot-host-

      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        with:
          path: batocera/dl
          key: buildroot-dl-same-cdi-${{ hashFiles('batocera/package/batocera/emulators/retroarch/libretro/libretro-same-cdi/libretro-same-cdi.mk') }}
          restore-keys: buildroot-dl-

      - name: Build same-cdi (MAME libretro core)
        run: |
          cd batocera
          make a733-cubie-a7s-build CMD=libretro-same-cdi DIRECT_BUILD=1
        timeout-minutes: 180

      - name: Collect artifacts
        run: |
          mkdir -p ci-artifacts/same-cdi
          find "${{ env.BR_OUTPUT_DIR }}/build" -name "same_cdi_libretro.so" \
            -exec cp {} ci-artifacts/same-cdi/ \;

      - name: Upload same-cdi artifacts
        uses: actions/upload-artifact@v4
        with:
          name: same-cdi-aarch64
          path: ci-artifacts/same-cdi/
          retention-days: 90

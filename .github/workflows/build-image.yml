name: Build OctaneOS image (a733-cubie-a7s)

# Full image build — produces a flashable batocera.img artifact.
# Runs on push to main or manual trigger.
# Same-cdi and ecwolf are enabled; GitHub Actions runners have enough
# RAM to handle MAME. Local WSL2 builds disable same-cdi via local.mk.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/build-heavy-packages.yml'

env:
  OUTPUT_DIR: batocera/output/a733-cubie-a7s
  BR_OUTPUT_DIR: batocera/buildroot/batocera/output/a733-cubie-a7s/a733-cubie-a7s

jobs:
  build-image:
    name: Build OctaneOS image (aarch64)
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          echo "=== Disk before ===" && df -h /
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "=== Disk after ===" && df -h /

      - name: Checkout OctaneOS
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install host build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc g++ make cmake ninja-build \
            git curl wget rsync cpio bc \
            libncurses-dev libssl-dev \
            python3 python3-dev \
            unzip file bison flex gawk whiptail \
            dosfstools mtools \
            u-boot-tools \
            gettext

      - name: Set up symlinks (non-interactive)
        run: |
          REPO_ROOT="$(pwd)"
          BATOCERA_DIR="${REPO_ROOT}/batocera"
          ln -sf "${REPO_ROOT}/board/batocera/allwinner/a733" \
                 "${BATOCERA_DIR}/board/batocera/allwinner/a733"
          ln -sf "${REPO_ROOT}/configs/batocera-a733-cubie-a7s.board" \
                 "${BATOCERA_DIR}/configs/batocera-a733-cubie-a7s.board"

      - name: Sync local.mk into output dir
        run: |
          mkdir -p "${{ env.OUTPUT_DIR }}"
          cp board/batocera/allwinner/a733/local.mk "${{ env.OUTPUT_DIR }}/local.mk"
          mkdir -p "${{ env.BR_OUTPUT_DIR }}"
          cp board/batocera/allwinner/a733/local.mk "${{ env.BR_OUTPUT_DIR }}/local.mk"

      - name: Apply buildroot package patches
        run: |
          # faad2 2.11.1: missing -lm link on aarch64 (lrintf/sincos/sqrtf/log/pow
          # are library calls on aarch64, not compiler built-ins like on x86).
          sed -i '/\$(eval \$(cmake-package))/i FAAD2_CONF_OPTS += -DCMAKE_EXE_LINKER_FLAGS="$(TARGET_LDFLAGS) -lm" -DCMAKE_SHARED_LINKER_FLAGS="$(TARGET_LDFLAGS) -lm"\n' \
            batocera/buildroot/package/faad2/faad2.mk
          # libmodplug: load_pat.cpp redeclares sinf as static after <cmath> declares it
          # extern — GCC 13 treats this as an error; -fpermissive downgrades it to a warning.
          sed -i '/\$(eval \$(cmake-package))/i LIBMODPLUG_CONF_OPTS += -DCMAKE_CXX_FLAGS="$(TARGET_CXXFLAGS) -fpermissive"\n' \
            batocera/buildroot/package/libmodplug/libmodplug.mk
          # poppler-22.12.0: cmake/modules/FindIconv.cmake uses all-caps ICONV_INCLUDE_DIR
          # and ICONV_LIBRARIES (old-style, pre-3.11 cmake convention). On glibc iconv is
          # in libc — pre-set both variables so the module's find_path/find_library are
          # skipped and ICONV_FOUND=TRUE is set directly.
          sed -i '/\$(eval \$(cmake-package))/i POPPLER_CONF_OPTS += -DICONV_INCLUDE_DIR:PATH=$(STAGING_DIR)/usr/include -DICONV_LIBRARIES:STRING=-lc\n' \
            batocera/buildroot/package/poppler/poppler.mk
          # libretro-melonds: A733 has no desktop GL (softpipe GLES only).
          # Inject A733-specific block before the generic aarch64 fallback.
          python3 -c 'import pathlib; f=pathlib.Path("batocera/package/batocera/emulators/retroarch/libretro/libretro-melonds/libretro-melonds.mk"); txt=f.read_text(); old="else ifeq ($(BR2_aarch64),y)\nLIBRETRO_MELONDS_PLATFORM = unix"; new="else ifeq ($(BR2_PACKAGE_BATOCERA_TARGET_A733),y)\nLIBRETRO_MELONDS_PLATFORM = unix\nLIBRETRO_MELONDS_EXTRA_ARGS += HAVE_OPENGL=0 ARCH=arm64\n\n"+old; f.write_text(txt.replace(old, new, 1))'

      - name: Install make shim (fixes --no-builtin-rules propagation)
        run: |
          REAL_MAKE="$(command -v make)"
          SHIM_DIR="$(mktemp -d)"
          cat > "${SHIM_DIR}/make" << SHIM_EOF
          #!/bin/bash
          _mf="\${MAKEFLAGS}"
          _mf="\$(echo "\$_mf" | sed 's/^\(-*\)\([A-QS-Za-qs-z]*\)r\([A-Za-z]*\)/\1\2\3/')"
          export MAKEFLAGS="\$_mf"
          exec ${REAL_MAKE} "\$@"
          SHIM_EOF
          chmod +x "${SHIM_DIR}/make"
          echo "${SHIM_DIR}" >> "$GITHUB_PATH"

      - name: Restore Buildroot toolchain cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.BR_OUTPUT_DIR }}/host
          key: buildroot-host-v4-${{ hashFiles('configs/batocera-a733-cubie-a7s.board') }}-${{ github.run_id }}
          restore-keys: |
            buildroot-host-v4-

      - name: Restore Buildroot build output cache
        id: cache-build-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.BR_OUTPUT_DIR }}/build
          key: buildroot-build-v2-${{ hashFiles('configs/batocera-a733-cubie-a7s.board') }}-${{ github.run_id }}
          restore-keys: buildroot-build-v2-${{ hashFiles('configs/batocera-a733-cubie-a7s.board') }}-

      - name: Wire staging symlink to sysroot
        run: |
          SYSROOT="${{ env.BR_OUTPUT_DIR }}/host/aarch64-buildroot-linux-gnu/sysroot"
          STAGING="${{ env.BR_OUTPUT_DIR }}/staging"
          # staging/ is not cached — it is always a symlink to host/sysroot so that
          # Buildroot's STAGING_DIR and the cross-linker sysroot are the same directory.
          mkdir -p "$(dirname "$STAGING")" "$SYSROOT"
          rm -rf "$STAGING"
          ln -sf "host/aarch64-buildroot-linux-gnu/sysroot" "$STAGING"
          echo "staging -> sysroot: $(ls -la "$STAGING" 2>/dev/null || echo missing)"

      - name: Pre-fetch tarballs that have flaky mirrors
        run: |
          mkdir -p batocera/dl
          # Only fetch if not already in the dl/ cache
          if [ ! -f batocera/dl/libtool-2.4.7.tar.xz ]; then
            wget -q -O batocera/dl/libtool-2.4.7.tar.xz \
              https://ftp.gnu.org/pub/gnu/libtool/libtool-2.4.7.tar.xz
          fi
          # The following packages all resolve to 131.252.210.176 (freedesktop.org /
          # mesa3d infrastructure) which is unreachable from GH Actions runners.
          # Pre-seed from our mirror release so buildroot doesn't attempt the download.
          BASE_URL="https://github.com/GameOctane/OctaneOS/releases/download/build-deps-v1"
          mkdir -p batocera/dl/mesa3d batocera/dl/dbus batocera/dl/libdrm batocera/dl/libxcb batocera/dl/xcb-proto
          [ -f batocera/dl/mesa3d/mesa-25.3.6.tar.xz ] || \
            wget -q -O batocera/dl/mesa3d/mesa-25.3.6.tar.xz     "${BASE_URL}/mesa-25.3.6.tar.xz"
          [ -f batocera/dl/dbus/dbus-1.14.10.tar.xz ] || \
            wget -q -O batocera/dl/dbus/dbus-1.14.10.tar.xz       "${BASE_URL}/dbus-1.14.10.tar.xz"
          [ -f batocera/dl/libdrm/libdrm-2.4.131.tar.xz ] || \
            wget -q -O batocera/dl/libdrm/libdrm-2.4.131.tar.xz   "${BASE_URL}/libdrm-2.4.131.tar.xz"
          [ -f batocera/dl/libxcb/libxcb-1.17.0.tar.xz ] || \
            wget -q -O batocera/dl/libxcb/libxcb-1.17.0.tar.xz   "${BASE_URL}/libxcb-1.17.0.tar.xz"
          [ -f batocera/dl/xcb-proto/xcb-proto-1.17.0.tar.xz ] || \
            wget -q -O batocera/dl/xcb-proto/xcb-proto-1.17.0.tar.xz "${BASE_URL}/xcb-proto-1.17.0.tar.xz"

      - name: Pre-seed dl/ecwolf/ cache (courtesy suckbluefrog/Batocera-Multilib)
        run: |
          mkdir -p batocera/dl
          wget -q -O /tmp/ecwolf-source.tar.gz \
            https://github.com/suckbluefrog/Batocera-Multilib/releases/download/7-4-2026/ecwolf-source.tar.gz
          tar xzf /tmp/ecwolf-source.tar.gz -C batocera/dl/

      - name: Validate host toolchain cache
        run: |
          if [ ! -f "${{ env.BR_OUTPUT_DIR }}/host/bin/ninja" ]; then
            echo "Host toolchain missing or incomplete — clearing host stamps to force rebuild"
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "host-*" -exec rm -rf {} + 2>/dev/null || true
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "toolchain-*" -exec rm -rf {} + 2>/dev/null || true
          else
            echo "Host toolchain OK: $(${{ env.BR_OUTPUT_DIR }}/host/bin/ninja --version 2>/dev/null || echo n/a)"
          fi
          # Sysroot is populated by linux-headers (kernel headers) and glibc
          # (stdio.h etc.) before host-gcc-final can build libgcc. If the
          # toolchain cache was saved mid-build, the sysroot may be partial.
          # Clear all three so buildroot re-installs them cleanly.
          if [ ! -f "${{ env.BR_OUTPUT_DIR }}/host/aarch64-buildroot-linux-gnu/sysroot/usr/include/stdio.h" ]; then
            echo "Sysroot C headers missing — forcing linux-headers, glibc, and host-gcc-final rebuild"
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "linux-headers-*" -exec rm -rf {} + 2>/dev/null || true
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "glibc-*" -exec rm -rf {} + 2>/dev/null || true
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "host-gcc-final-*" -exec rm -rf {} + 2>/dev/null || true
          fi
          # On aarch64, glibc installs crti.o to usr/lib64/ and Buildroot
          # creates a usr/lib -> lib64 symlink so the cross-linker can find it.
          # This symlink may be missing from a partial toolchain cache.
          SYSROOT="${{ env.BR_OUTPUT_DIR }}/host/aarch64-buildroot-linux-gnu/sysroot"
          if [ -d "${SYSROOT}/usr/lib64" ] && [ ! -e "${SYSROOT}/usr/lib" ]; then
            echo "Creating missing usr/lib -> lib64 symlink in sysroot"
            ln -sf lib64 "${SYSROOT}/usr/lib"
          fi
          # Trigger glibc+gcc-final rebuild if crti.o is absent from both paths
          if [ ! -f "${SYSROOT}/usr/lib64/crti.o" ] && [ ! -f "${SYSROOT}/usr/lib/crti.o" ]; then
            echo "Sysroot crti.o missing — forcing glibc and host-gcc-final rebuild"
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "glibc-*" -exec rm -rf {} + 2>/dev/null || true
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "host-gcc-final-*" -exec rm -rf {} + 2>/dev/null || true
          fi
          # host-cargo-c installs cargo-cbuild into host/bin/ but is not a toolchain
          # package — it's a host dependency of host-librsvg. If the toolchain cache
          # was saved before cargo-c was installed, the binary will be missing even
          # though build/host-cargo-c-*/.stamp_installed exists. Clear the stamps so
          # buildroot reinstalls it.
          if [ ! -f "${{ env.BR_OUTPUT_DIR }}/host/bin/cargo-cbuild" ]; then
            echo "cargo-cbuild missing from host/bin — clearing host-cargo-c stamps to force reinstall"
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "host-cargo-c-*" -exec rm -rf {} + 2>/dev/null || true
          fi
          # unifdef is used by webkitgtk during its ninja build to generate JSC headers.
          # If the toolchain cache predates host-unifdef installation, the binary is absent
          # and WebKit fails immediately. Clear stamps so buildroot reinstalls it.
          if [ ! -f "${{ env.BR_OUTPUT_DIR }}/host/bin/unifdef" ]; then
            echo "unifdef missing from host/bin — clearing host-unifdef stamps to force reinstall"
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "host-unifdef-*" -exec rm -rf {} + 2>/dev/null || true
          fi
          # webkitgtk links against several sysroot libraries that may be absent if the
          # toolchain cache predates their installation. Clear the corresponding package
          # stamps so buildroot reinstalls them before webkit tries to link.
          SYSROOT="${{ env.BR_OUTPUT_DIR }}/host/aarch64-buildroot-linux-gnu/sysroot"
          for pkg_check in \
            "libwoff2dec.so:woff2" \
            "libogg.so:libogg" \
            "libtheora.so:libtheora" \
            "libvorbis.so:libvorbis" \
            "libFLAC.so:flac" \
            "libopus.so:opus" \
            "libdav1d.so:dav1d" \
            "libvpx.so:libvpx" \
            "libx264.so:x264" \
            "libmpg123.so:mpg123" \
            "libcrypt.so:libxcrypt" \
            "libz.so:zlib"; do
            lib="${pkg_check%%:*}"
            pkg="${pkg_check##*:}"
            if [ ! -f "${SYSROOT}/usr/lib/${lib}" ] && [ ! -f "${SYSROOT}/usr/lib64/${lib}" ]; then
              echo "${lib} missing from sysroot — clearing ${pkg} stamps to force reinstall"
              find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "${pkg}-*" -exec rm -rf {} + 2>/dev/null || true
            fi
          done
          # host-qt6base installs Qt6HostInfo cmake files into host/lib/cmake/; the
          # target qt6base build needs them during cmake regeneration. If the toolchain
          # cache predates host-qt6base installation they are absent and qt6base fails.
          HOST_DIR="${{ env.BR_OUTPUT_DIR }}/host"
          for cmake_check in "Qt6HostInfo:host-qt6base"; do
            cmake_pkg="${cmake_check%%:*}"
            br_pkg="${cmake_check##*:}"
            if [ ! -d "${HOST_DIR}/lib/cmake/${cmake_pkg}" ]; then
              echo "${cmake_pkg} cmake files missing — clearing ${br_pkg} stamps to force reinstall"
              find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "${br_pkg}-*" -exec rm -rf {} + 2>/dev/null || true
            fi
          done
          # toolchainfile.cmake is generated by toolchain-buildroot's staging install hook.
          # If the toolchain cache was saved before that hook ran, the file is absent and
          # every TARGET cmake package will fail with "Could not find toolchain file".
          # Clear the toolchain-buildroot stamp so buildroot re-runs the hook.
          # toolchainfile.cmake is generated by TOOLCHAIN_CMAKE_INSTALL_FILES, a hook on
          # the 'toolchain' virtual package's staging install (not toolchain-buildroot).
          # Clear both so buildroot re-runs the hook and recreates the file.
          if [ ! -f "${{ env.BR_OUTPUT_DIR }}/host/share/buildroot/toolchainfile.cmake" ]; then
            echo "toolchainfile.cmake missing — clearing toolchain and toolchain-buildroot stamps"
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 \
              \( -name "toolchain-buildroot*" -o -name "toolchain" \) \
              -exec rm -rf {} + 2>/dev/null || true
          fi
          # target/ is not cached between runs, so the filesystem skeleton must always
          # re-run to recreate base dirs (usr/bin, etc/udev/rules.d, lib/modules, etc.).
          # Also remove .files-list*.before so Buildroot's install tracking doesn't fail
          # trying to diff against a snapshot that no longer exists.
          find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 \
            \( -name "skeleton*" -o -name "skeleton-init-*" \) \
            -exec sh -c 'rm -f "$1"/.stamp_target_installed "$1"/.files-list*.before' _ {} \; \
            2>/dev/null || true
          # If libz.so is missing the sysroot is essentially empty — the toolchain cache
          # was saved before target packages were installed. Clear all fast target package
          # stamps (excluding heavyweight packages that take hours) so buildroot reinstalls
          # them to the sysroot. Their sources and build artifacts are still in build/ so
          # this is a reinstall-only pass, not a full recompile.
          if [ ! -f "${SYSROOT}/usr/lib/libz.so" ] && [ ! -f "${SYSROOT}/usr/lib64/libz.so" ]; then
            echo "libz.so missing — sysroot is empty, clearing target package stamps for reinstall"
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -mindepth 1 -type d \
              ! -name 'host-*' \
              ! -name 'toolchain*' \
              ! -name 'linux-headers-*' \
              ! -name 'glibc-*' \
              ! -name 'webkitgtk-*' \
              ! -name 'wpewebkit-*' \
              ! -name 'qt6*' \
              ! -name 'ryujinx-*' \
              ! -name 'dolphin-*' \
              ! -name 'ppsspp-*' \
              ! -name 'pcsx2-*' \
              ! -name 'rpcs3-*' \
              ! -name 'linux-*' \
              ! -name '.*' \
              -exec rm -rf {} + 2>/dev/null || true
          elif [ ! -f "${SYSROOT}/usr/include/png.h" ]; then
            echo "png.h missing from sysroot — clearing libpng stamps to force reinstall"
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "libpng-*" -exec rm -rf {} + 2>/dev/null || true
          fi

      - name: Clean inconsistent package state from cache
        run: |
          BUILD_DIR="${{ env.BR_OUTPUT_DIR }}/build"
          if [ -d "$BUILD_DIR" ]; then
            find "$BUILD_DIR" -name ".stamp_configured" | while read f; do
              pkg_dir=$(dirname "$f")
              pkg_name=$(basename "$pkg_dir")
              if [ ! -f "$pkg_dir/.stamp_built" ]; then
                # WebKit packages take longer than one CI window to compile.
                # Leave them intact so ninja can resume across runs.
                case "$pkg_name" in
                  webkitgtk-*|wpewebkit-*|qt6*|ryujinx-*|dolphin-*|ppsspp-*|pcsx2-*|rpcs3-*|mame-*)
                    echo "Leaving partial large package build intact for resume: $pkg_name"
                    ;;
                  *)
                    echo "Cleaning incomplete package: $pkg_dir"
                    rm -rf "$pkg_dir"
                    ;;
                esac
              fi
            done
            # If the kernel build dir is missing the sun60iw2 dt-bindings headers it
            # was patched before linux_patches/0003 existed. Clear the kernel dir so
            # buildroot re-extracts and re-applies all patches including the new one.
            KERNEL_DIR=$(find "$BUILD_DIR" -maxdepth 1 -name "linux-*" -type d 2>/dev/null | head -1)
            if [ -n "$KERNEL_DIR" ] && \
               [ ! -f "$KERNEL_DIR/include/dt-bindings/clock/sun60iw2-ccu.h" ]; then
              echo "sun60iw2 dt-bindings missing from kernel tree — clearing kernel dir to force re-patch"
              rm -rf "$KERNEL_DIR"
            fi
          fi

      - name: Build OctaneOS image
        id: build
        run: |
          cd batocera
          SYSROOT="buildroot/batocera/output/a733-cubie-a7s/a733-cubie-a7s/host/aarch64-buildroot-linux-gnu/sysroot"
          BUILD_DIR="buildroot/batocera/output/a733-cubie-a7s/a733-cubie-a7s/build"

          echo "=== Pre-build sysroot state ==="
          ls -la "${SYSROOT}/usr/" 2>/dev/null || echo "(sysroot/usr not yet populated)"
          echo "lib/crti.o:   $([ -f "${SYSROOT}/usr/lib/crti.o"   ] && echo PRESENT || echo missing)"
          echo "lib64/crti.o: $([ -f "${SYSROOT}/usr/lib64/crti.o" ] && echo PRESENT || echo missing)"

          # Use `if` so set -e doesn't kill the script when make fails
          if make a733-cubie-a7s-build DIRECT_BUILD=1; then
            BUILD_STATUS=0
          else
            BUILD_STATUS=$?
            echo "=== Post-failure sysroot state ==="
            ls -la "${SYSROOT}/usr/" 2>/dev/null | head -20 || echo "(sysroot/usr missing)"
            echo "lib/crti.o:   $([ -f "${SYSROOT}/usr/lib/crti.o"   ] && echo PRESENT || echo MISSING)"
            echo "lib64/crti.o: $([ -f "${SYSROOT}/usr/lib64/crti.o" ] && echo PRESENT || echo MISSING)"

            # glibc on aarch64 installs CRT objects to usr/lib64/ while the
            # cross-linker searches usr/lib/ — create the symlink and retry once.
            if [ -f "${SYSROOT}/usr/lib64/crti.o" ] && [ ! -e "${SYSROOT}/usr/lib" ]; then
              echo "=== Retrying: creating usr/lib -> lib64 symlink in sysroot ==="
              ln -sf lib64 "${SYSROOT}/usr/lib"
              find "${BUILD_DIR}" -maxdepth 1 -name "host-gcc-final-*" -exec rm -rf {} + 2>/dev/null || true
              if make a733-cubie-a7s-build DIRECT_BUILD=1; then
                BUILD_STATUS=0
              else
                BUILD_STATUS=$?
              fi
            fi
          fi

          exit $BUILD_STATUS
        timeout-minutes: 90
        continue-on-error: true

      - name: Pre-cache diagnostics and process cleanup
        if: always()
        run: |
          echo "=== Lingering build processes ==="
          ps aux | grep -E "ninja|cmake|make|g\+\+|cc1plus|as" | grep -v grep || echo "(none)"
          sudo killall -q ninja make cmake || true
          sudo killall -q aarch64-buildroot-linux-gnu-g++.br_real cc1plus as || true
          sleep 3
          echo "=== Processes after kill ==="
          ps aux | grep -E "ninja|cmake|make|g\+\+|cc1plus|as" | grep -v grep || echo "(none)"
          echo "=== Build output disk usage ==="
          du -sh "${{ env.BR_OUTPUT_DIR }}/build" "${{ env.BR_OUTPUT_DIR }}/staging" 2>/dev/null || echo "(dirs missing)"
          echo "=== Disk free ==="
          df -h /

      - name: Strip object files from fully-installed packages
        if: always()
        run: |
          BUILD_DIR="${{ env.BR_OUTPUT_DIR }}/build"
          if [ ! -d "$BUILD_DIR" ]; then
            echo "Build dir missing, skipping."
            exit 0
          fi
          echo "=== Cache size before cleanup ==="
          du -sh "$BUILD_DIR" || true
          find "$BUILD_DIR" -maxdepth 1 -mindepth 1 -type d | while read pkg_dir; do
            if [ -f "$pkg_dir/.stamp_installed" ]; then
              find "$pkg_dir" -type f \( -name "*.o" -o -name "*.lo" \) -delete 2>/dev/null || true
            fi
          done
          echo "=== Cache size after cleanup ==="
          du -sh "$BUILD_DIR" || true

      - name: Save Buildroot toolchain cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ${{ env.BR_OUTPUT_DIR }}/host
          key: buildroot-host-v4-${{ hashFiles('configs/batocera-a733-cubie-a7s.board') }}-${{ github.run_id }}

      - name: Save Buildroot build output cache
        id: save-build-cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ${{ env.BR_OUTPUT_DIR }}/build
          key: buildroot-build-v2-${{ hashFiles('configs/batocera-a733-cubie-a7s.board') }}-${{ github.run_id }}

      - name: Prune old build output caches
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_BUILD_KEY="buildroot-build-v2-${{ hashFiles('configs/batocera-a733-cubie-a7s.board') }}-${{ github.run_id }}"
          CURRENT_HOST_KEY="buildroot-host-v4-${{ hashFiles('configs/batocera-a733-cubie-a7s.board') }}-${{ github.run_id }}"
          gh api repos/${{ github.repository }}/actions/caches \
            --jq ".actions_caches[] | select(
              (.key | startswith(\"buildroot-build-v2-\")) or
              (.key | startswith(\"buildroot-host-v4-\"))
            ) | select(.key != \"$CURRENT_BUILD_KEY\" and .key != \"$CURRENT_HOST_KEY\") | .id" \
            | while read id; do
              gh api --method DELETE repos/${{ github.repository }}/actions/caches/$id || true
            done

      - name: Collect image
        if: steps.build.outcome == 'success'
        run: |
          mkdir -p ci-artifacts
          find "${{ env.BR_OUTPUT_DIR }}/images" -name "batocera.img" \
            -exec cp {} ci-artifacts/ \;
          ls -lh ci-artifacts/

      - name: Upload image artifact
        if: steps.build.outcome == 'success'

image boot.vfat {
	vfat {
		extraargs = "-F 32 -n BATOCERA"
		@files
	}
	size = 6G
}

image userdata.ext4 {
	ext4 {
		label = "SHARE"
		use-mke2fs = "true"
		extraargs = "-m 0"
	}
	size = "512M"
	mountpoint = "/userdata"
}

image OctaneOS.img {
	hdimage {
		align = "512"
		partition-table-type = "gpt"
	}

	# Allwinner A733 (sun60iw2) boot chain:
	# BROM → boot0 (DRAM init / SPL) → boot_package (U-Boot) → kernel
	#
	# Offsets confirmed by extracting from Radxa official CLI image (rsdk-r2):
	#   boot0:        0x20000  (128KB) — eGON.BT0 magic, 240KB
	#   boot_package: 0xC00000 (12MB)  — sunxi-package magic, ~1.4MB
	#
	# Source blobs: board/batocera/allwinner/a733/cubie-a7s/boot/
	# Extracted from: https://github.com/radxa-build/radxa-a733/releases/tag/rsdk-r2

	partition boot0 {
		image = "boot0_sdcard.fex"
		offset = 128K
	}

	partition boot-pkg {
		image = "boot_package.fex"
		offset = 12M
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
		offset = 20M
	}

	partition userdata {
		partition-type = 0x83
		image = "userdata.ext4"
	}
}
